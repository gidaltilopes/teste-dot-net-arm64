trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '8.0.x'

  # Discord webhook (ideal: trocar por secret variable no Azure DevOps)
  DISCORD_WEBHOOK: 'https://discord.com/api/webhooks/SEU_WEBHOOK_AQUI'

  # SonarCloud
  sonarServiceConnection: 'sc-sonarcloud'
  sonarOrganization: 'gidaltilopes'
  sonarProjectKey: 'gidaltilopes_teste-dot-net-arm64'
  sonarProjectName: 'teste-dot-net-arm64'

  # Container / ACR
  dockerRegistryServiceConnection: 'sc-acr'
  containerRegistry: 'testedotnet.azurecr.io'
  imageRepository: 'hello-world-arm64'
  imageTag: '$(Build.BuildId)'

  # Azure / AKS
  azureSubscription: 'sc-azure'
  aksResourceGroup: 'resource1'
  aksClusterName: 'aksdev'
  kubernetesNamespace: 'default'

  # Paths
  appProject: 'HelloWorld.csproj'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'

stages:

- stage: Build
  displayName: 'Build'
  jobs:
  - job: BuildJob
    displayName: 'Build .NET Application'
    steps:
    - checkout: self

    - task: UseDotNet@2
      displayName: 'Use .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'

    - task: DotNetCoreCLI@2
      displayName: 'Restore'
      inputs:
        command: 'restore'
        projects: '$(appProject)'

    - task: DotNetCoreCLI@2
      displayName: 'Build'
      inputs:
        command: 'build'
        projects: '$(appProject)'
        arguments: '--configuration $(buildConfiguration) --no-restore'

- stage: Analyze
  displayName: 'Analyze with SonarCloud'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: SonarJob
    displayName: 'SonarCloud Analysis'
    steps:
    - checkout: self

    - task: UseDotNet@2
      displayName: 'Use .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'

    - task: SonarCloudPrepare@4
      displayName: 'Prepare SonarCloud'
      inputs:
        SonarCloud: '$(sonarServiceConnection)'
        organization: '$(sonarOrganization)'
        scannerMode: 'dotnet'
        projectKey: '$(sonarProjectKey)'
        projectName: '$(sonarProjectName)'

    - task: DotNetCoreCLI@2
      displayName: 'Build for Sonar'
      inputs:
        command: 'build'
        projects: '$(appProject)'
        arguments: '--configuration $(buildConfiguration)'

    - task: SonarCloudAnalyze@4
      displayName: 'Run SonarCloud Analysis'

    - task: SonarCloudPublish@4
      displayName: 'Publish Quality Gate'
      inputs:
        pollingTimeoutSec: '300'

- stage: Package
  displayName: 'Build and Push ARM64 Image'
  dependsOn: Analyze
  condition: succeeded()
  jobs:
  - job: DockerJob
    displayName: 'Build ARM64 Docker Image'
    steps:
    - checkout: self

    - task: Docker@2
      displayName: 'Login to ACR'
      inputs:
        command: 'login'
        containerRegistry: '$(dockerRegistryServiceConnection)'

    - script: |
        docker buildx create --use --name arm64builder || docker buildx use arm64builder
        docker buildx inspect --bootstrap

        docker buildx build \
          --platform linux/arm64 \
          -f $(dockerfilePath) \
          -t $(containerRegistry)/$(imageRepository):$(imageTag) \
          -t $(containerRegistry)/$(imageRepository):latest \
          --push \
          .
      displayName: 'Buildx ARM64 and Push'

- stage: Deploy
  displayName: 'Deploy to AKS'
  dependsOn: Package
  condition: succeeded()
  jobs:
  - job: DeployJob
    displayName: 'Deploy Kubernetes Manifests'
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Get AKS credentials and deploy'
      inputs:
        azureSubscription: '$(azureSubscription)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials \
            --resource-group $(aksResourceGroup) \
            --name $(aksClusterName) \
            --overwrite-existing

          kubectl apply -n $(kubernetesNamespace) -f k8s/deployment.yaml
          kubectl apply -n $(kubernetesNamespace) -f k8s/service.yaml
          kubectl apply -n $(kubernetesNamespace) -f k8s/ingress.yaml

          kubectl rollout status deployment/hello-world-arm64 -n $(kubernetesNamespace)
          kubectl get pods -n $(kubernetesNamespace)
          kubectl get svc -n $(kubernetesNamespace)
          kubectl get ingress -n $(kubernetesNamespace)

- stage: Notify_Success
  displayName: 'Notify Discord Success'
  dependsOn: Deploy
  condition: succeeded()
  jobs:
  - job: NotifySuccessJob
    displayName: 'Send Success Notification'
    steps:
    - script: |
        curl -H "Content-Type: application/json" \
        -X POST \
        -d "{
          \"content\": \"✅ SUCCESS\nBuild: $(Build.BuildId)\nBranch: $(Build.SourceBranchName)\nRepo: $(Build.Repository.Name)\nPipeline: $(System.DefinitionName)\"
        }" \
        "$(DISCORD_WEBHOOK)"
      displayName: 'Send Discord Success'

- stage: Notify_Failure
  displayName: 'Notify Discord Failure'
  dependsOn:
    - Build
    - Analyze
    - Package
    - Deploy
  condition: failed()
  jobs:
  - job: NotifyFailureJob
    displayName: 'Send Failure Notification'
    steps:
    - script: |
        curl -H "Content-Type: application/json" \
        -X POST \
        -d "{
          \"content\": \"❌ FAILED\nBuild: $(Build.BuildId)\nBranch: $(Build.SourceBranchName)\nRepo: $(Build.Repository.Name)\nPipeline: $(System.DefinitionName)\"
        }" \
        "$(DISCORD_WEBHOOK)"
      displayName: 'Send Discord Failure'