trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '8.0.x'

  # Discord webhook (coloque como secret depois)
  DISCORD_WEBHOOK: 'https://discord.com/api/webhooks/SEU_WEBHOOK_AQUI'

  # SonarCloud
  sonarServiceConnection: 'sc-sonarcloud'
  sonarOrganization: 'gidaltilopes'
  sonarProjectKey: 'gidaltilopes_teste-dot-net'
  sonarProjectName: 'teste-dot-net'

  # Container / ACR
  dockerRegistryServiceConnection: 'sc-acr'
  containerRegistry: 'testedotnet.azurecr.io'
  imageRepository: 'hello-world-arm64'
  imageTag: '$(Build.BuildId)'

  # Azure / AKS
  azureSubscription: 'sc-azure'
  aksResourceGroup: 'resource1'
  aksClusterName: 'aksdev'
  kubernetesNamespace: 'default'

  # Paths
  appProject: 'HelloWorld.csproj'
  testProjects: 'tests/**/*.csproj'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'

stages:

# =====================
# BUILD
# =====================
- stage: Build
  displayName: 'Build'
  jobs:
  - job: BuildJob
    steps:
    - checkout: self

    - task: UseDotNet@2
      displayName: 'Use .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'

    - task: DotNetCoreCLI@2
      displayName: 'Restore'
      inputs:
        command: 'restore'
        projects: '$(appProject)'

    - task: DotNetCoreCLI@2
      displayName: 'Build'
      inputs:
        command: 'build'
        projects: '$(appProject)'
        arguments: '--configuration $(buildConfiguration) --no-restore'

# =====================
# TEST + SONAR
# =====================
- stage: Test
  displayName: 'Test'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: TestJob
    steps:
    - checkout: self

    - task: UseDotNet@2
      displayName: 'Use .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'

    - task: SonarCloudPrepare@4
      inputs:
        SonarCloud: '$(sonarServiceConnection)'
        organization: '$(sonarOrganization)'
        scannerMode: 'dotnet'
        projectKey: '$(sonarProjectKey)'
        projectName: '$(sonarProjectName)'

    - task: DotNetCoreCLI@2
      displayName: 'Build for test'
      inputs:
        command: 'build'
        projects: '$(appProject)'
        arguments: '--configuration $(buildConfiguration)'

    - task: DotNetCoreCLI@2
      displayName: 'Run tests'
      inputs:
        command: 'test'
        projects: '$(testProjects)'
        arguments: '--configuration $(buildConfiguration) --no-build'
        publishTestResults: true

    - task: SonarCloudAnalyze@4
    - task: SonarCloudPublish@4
      inputs:
        pollingTimeoutSec: '300'

# =====================
# PACKAGE ARM64
# =====================
- stage: Package
  displayName: 'Build and Push ARM64'
  dependsOn: Test
  condition: succeeded()
  jobs:
  - job: DockerJob
    steps:
    - checkout: self

    - task: Docker@2
      displayName: 'Login to ACR'
      inputs:
        command: 'login'
        containerRegistry: '$(dockerRegistryServiceConnection)'

    - script: |
        docker buildx create --use --name arm64builder || docker buildx use arm64builder
        docker buildx inspect --bootstrap

        docker buildx build \
          --platform linux/arm64 \
          -f $(dockerfilePath) \
          -t $(containerRegistry)/$(imageRepository):$(imageTag) \
          -t $(containerRegistry)/$(imageRepository):latest \
          --push \
          .
      displayName: 'Buildx ARM64 and push'

# =====================
# DEPLOY AKS
# =====================
- stage: Deploy
  displayName: 'Deploy to AKS'
  dependsOn: Package
  condition: succeeded()
  jobs:
  - job: DeployJob
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Deploy manifests'
      inputs:
        azureSubscription: '$(azureSubscription)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials \
            --resource-group $(aksResourceGroup) \
            --name $(aksClusterName) \
            --overwrite-existing

          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

          kubectl rollout status deployment/hello-world-arm64 -n $(kubernetesNamespace)

# =====================
# DISCORD SUCCESS
# =====================
- stage: Notify_Success
  displayName: 'Notify Discord Success'
  dependsOn: Deploy
  condition: succeeded()
  jobs:
  - job: Notify
    steps:
    - script: |
        curl -H "Content-Type: application/json" \
        -X POST \
        -d "{
          \"content\": \"✅ SUCCESS\nBuild: $(Build.BuildId)\nBranch: $(Build.SourceBranchName)\nRepo: $(Build.Repository.Name)\"
        }" \
        $(DISCORD_WEBHOOK)

# =====================
# DISCORD FAILURE
# =====================
- stage: Notify_Failure
  displayName: 'Notify Discord Failure'
  dependsOn: Deploy
  condition: failed()
  jobs:
  - job: Notify
    steps:
    - script: |
        curl -H "Content-Type: application/json" \
        -X POST \
        -d "{
          \"content\": \"❌ FAILED\nBuild: $(Build.BuildId)\nBranch: $(Build.SourceBranchName)\nRepo: $(Build.Repository.Name)\"
        }" \
        $(DISCORD_WEBHOOK)